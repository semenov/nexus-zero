services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../server/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://nexus:${DB_PASSWORD}@postgres/nexus?sslmode=disable
      PORT: 8888
      APNS_KEY_PATH: ${APNS_KEY_PATH}
      APNS_KEY_ID: ${APNS_KEY_ID}
      APNS_TEAM_ID: ${APNS_TEAM_ID}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID}
    volumes:
      - ./apns.p8:${APNS_KEY_PATH}:ro
    ports:
      - "127.0.0.1:8888:8888"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
